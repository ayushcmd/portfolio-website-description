<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found · Ayush Raj</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--ink:#08080d;--ink2:#111118;--ink3:#1a1a24;--amber:#f5a623;--mint:#00ffa3;--text:#c8c8d8;--text-dim:#5a5a72;--white:#f0f0f8}
    body{font-family:'JetBrains Mono',monospace;background:var(--ink);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}

    #grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;
      background-image:linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);
      background-size:48px 48px}

    .container{position:relative;z-index:1;text-align:center;padding:40px 24px;max-width:560px}

    .err-code{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(6rem,18vw,10rem);line-height:1;color:var(--ink2);letter-spacing:-0.05em;position:relative;display:inline-block}
    .err-code::after{content:'404';position:absolute;inset:0;color:transparent;-webkit-text-stroke:1px rgba(245,166,35,0.3)}

    .err-label{font-size:0.62rem;color:var(--amber);letter-spacing:0.18em;text-transform:uppercase;margin-bottom:16px;margin-top:-8px}

    .err-title{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(1.6rem,4vw,2.4rem);color:var(--white);letter-spacing:-0.03em;margin-bottom:8px}
    .err-title em{font-family:'Instrument Serif',serif;font-style:italic;color:var(--amber)}

    .err-desc{font-size:0.78rem;color:var(--text-dim);line-height:1.8;margin-bottom:40px;max-width:400px;margin-left:auto;margin-right:auto}

    .err-terminal{background:var(--ink2);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:20px 24px;margin-bottom:36px;text-align:left;font-size:0.75rem}
    .err-terminal .t-line{margin-bottom:6px}
    .err-terminal .t-prompt{color:var(--mint)}
    .err-terminal .t-cmd{color:var(--amber)}
    .err-terminal .t-out{color:var(--text-dim);padding-left:16px}
    .err-terminal .t-err{color:#ff6b6b;padding-left:16px}

    .err-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}

    .btn-primary{font-family:'JetBrains Mono',monospace;font-size:0.75rem;letter-spacing:0.08em;text-transform:uppercase;padding:12px 24px;background:var(--amber);color:var(--ink);border:none;border-radius:4px;text-decoration:none;font-weight:600;transition:all 0.25s}
    .btn-primary:hover{background:var(--white);transform:translateY(-2px)}

    .btn-ghost{font-family:'JetBrains Mono',monospace;font-size:0.75rem;letter-spacing:0.08em;text-transform:uppercase;padding:12px 24px;background:transparent;color:var(--text);border:1px solid rgba(255,255,255,0.12);border-radius:4px;text-decoration:none;font-weight:400;transition:all 0.25s}
    .btn-ghost:hover{border-color:var(--mint);color:var(--mint)}

    /* Blinking cursor */
    .cursor{display:inline-block;width:8px;height:1em;background:var(--amber);animation:blink 1s step-end infinite;vertical-align:middle;margin-left:4px}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
  </style>
</head>
<body>
<div id="grid-bg"></div>

<div class="container">
  <div class="err-code">404</div>
  <div class="err-label">Error · Page not found</div>
  <h1 class="err-title">Lost in the<br><em>void.</em></h1>
  

  <div class="err-terminal">
    <div class="t-line t-err">The page you're looking for doesn't exist, was moved, or the URL is incorrect.</div>
   
  </div>

  <div class="err-actions">
    <a href="index.html" class="btn-primary">↩ Go Home</a>
    <a href="mailto:ayushhh0826@outlook.com" class="btn-ghost">Report Issue</a>
  </div>
</div>

<script>
  // Show the actual bad path in terminal
  const p = window.location.pathname.split('/').pop() || 'this-page';
  document.getElementById('pathname').textContent = p;
</script>
</body>
</html>
